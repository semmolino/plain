name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix backend

      - name: Run tests
        run: npm test --prefix backend -- --no-coverage --ci
        env:
          JWT_SECRET: test-secret-ci

  frontend-typecheck:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend-react

      - name: Type check
        run: cd frontend-react && npx tsc -b

  frontend-unit:
    name: Frontend Unit (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend-react

      - name: Run unit tests
        run: cd frontend-react && npx vitest run

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend-react

      - name: Install Playwright Chromium
        run: cd frontend-react && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd frontend-react && npx playwright test --project=desktop --project=mobile
        env:
          CI: true

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-react/playwright-report/
          retention-days: 7
